syntax = "proto3";

package cosmos.loan.v1;

option go_package = "github.com/cosmos/cosmos-sdk/x/loan/types";

import "cosmos_proto/cosmos.proto";

// Params berisi konfigurasi global modul loan yang dapat diubah melalui governance
message Params {
  // denom token yang digunakan (uover, uatom)
  string settlement_denom = 1;

  // max pinjaman
  uint64 max_loan_amount = 2;

  // min pinjaman
  uint64 min_loan_amount = 3;

  // max durasi peminjaman
  uint64 max_tenor_months = 4;

  // policy addresses yang berwenang approve loan
  repeated string laz_authorities = 5 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  //  policy addresses yang berwenang approve disbursement
  repeated string omnibus_authorities = 6 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}