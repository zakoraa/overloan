syntax = "proto3";

package cosmos.loan.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "cosmos/loan/v1/params.proto";
import "cosmos/loan/v1/loan.proto";

option go_package = "github.com/cosmos/cosmos-sdk/x/loan/types";

// GenesisState defines the loan module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];

  // next_id is the next loan ID to assign.
  uint64 next_id = 2;

  // loans defines all existing loans at genesis.
  repeated Loan loans = 3 [
    (gogoproto.nullable) = false
  ];
}