syntax = "proto3";

package cosmos.loan.v1;

option go_package = "github.com/cosmos/cosmos-sdk/x/loan/types";

import "cosmos/base/v1beta1/coin.proto";
import "google/protobuf/timestamp.proto";
import "gogoproto/gogo.proto";

option (gogoproto.marshaler_all)   = true;
option (gogoproto.unmarshaler_all) = true;
option (gogoproto.sizer_all)       = true;

// LoanStatus merupakam status dari sebuah pinjaman
enum LoanStatus {
  // nilai default
  LOAN_STATUS_UNSPECIFIED = 0;

  // pinjaman baru dibuat dan menunggu persetujuan
  LOAN_STATUS_PENDING = 1;

  // pinjaman telah disetujui oleh policy yang berwenang (laz)
  LOAN_STATUS_APPROVED = 2;

  // dana sudah dicairkan ke borrower
  LOAN_STATUS_DISBURSED = 3;

  // sisa dana telah dibayarkan
  LOAN_STATUS_REPAID = 4;

  // pinjaman ditolak oleh policy yang berwenang (laz)
  LOAN_STATUS_REJECTED = 5;

  // pinjaman dibatalkan sebelum pencairan
  LOAN_STATUS_CANCELLED = 6;
}

// Loan merupakan representasi kontrak pinjaman
message Loan {
  // ID unik pinjaman
  uint64 id = 1;

  // sdk.AccAddress (dalam format bech32)
  string borrower = 2;

  // group policy address yang approve
  // audit siapa policy yang approve
  string laz_policy = 3;

  // Nilai pokok awal peminjaman saat disetujui
  cosmos.base.v1beta1.Coin principal = 4;
  // Sisa kewajiban yang masih harus dibayar
  cosmos.base.v1beta1.Coin outstanding = 5;

  // Durasi pinjaman dalam bulan
  uint64 tenor_months = 6;

  // status pembayaran
  LoanStatus status = 7;

  // waktu saat permohonan pinjaman dibuat (block time).
  google.protobuf.Timestamp created_at = 8 [(gogoproto.stdtime) = true];

  // waktu saat pinjaman disetujui.
  google.protobuf.Timestamp approved_at = 9 [(gogoproto.stdtime) = true];

  // waktu saat dana dicairkan ke borrower.
  google.protobuf.Timestamp disbursed_at = 10 [(gogoproto.stdtime) = true];

  // document hash (bisa pakai hash dari IPFS kalau digunakan)
  string metadata_hash = 11;
}