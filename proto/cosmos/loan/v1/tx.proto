syntax = "proto3";

package cosmos.loan.v1;

option go_package = "github.com/cosmos/cosmos-sdk/x/loan/types";

import "cosmos/base/v1beta1/coin.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "cosmos/loan/v1/params.proto";

// Msg defines the Msg service
service Msg {
  option (cosmos.msg.v1.service) = true;

  // Mengubah konfigurasi global modul (hanya authority)
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // Membuat permohonan pinjaman baru dengan status PENDING oleh borrower
  rpc CreateLoan(MsgCreateLoan) returns (MsgCreateLoanResponse);

  // Menyetujui pinjaman berstatus PENDING oleh laz yang berwenang
  // status berubah jadi APPROVED
  rpc ApproveLoan(MsgApproveLoan) returns (MsgApproveLoanResponse);

  // Menolak pinjaman berstatus PENDING oleh laz yang berwenang
  // status berubah jadi REJECTED
  rpc RejectLoan(MsgRejectLoan) returns (MsgRejectLoanResponse);

  // Mencatat pembayaran pinjaman oleh omnibus
  // Mengurangi outstanding dan membakar settlement token
  rpc RepayLoan(MsgRepayLoan) returns (MsgRepayLoanResponse);

  // Mengonfirmasi pencairan dana dan mengubah status menjadi DISBURSED
  rpc ConfirmDisbursement(MsgConfirmDisbursement) returns (MsgConfirmDisbursementResponse);

  // Menolak pencairan dana pinjaman yang sudah disetujui
  rpc RejectDisbursement(MsgRejectDisbursement) returns (MsgRejectDisbursementResponse);
}

// MsgUpdateParams digunakan untuk mengubah parameter modul
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";

  // alamat otoritas (misal governance module)
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // konfigurasi baru yang akan menggantikan params lama
  Params params = 2;
}

// Response kosong karena hanya update state
message MsgUpdateParamsResponse {}

// MsgCreateLoan digunakan oleh borrower untuk mengajukan permohonan pinjaman baru
message MsgCreateLoan {
  option (cosmos.msg.v1.signer) = "borrower";

  // Alamat borrower (Bech32) sebagai pemohon pinjaman
  string borrower = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // Alamat laz (Bech32) sebagai penerima pemohonan pinjaman
  string laz = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // Nilai pokok pinjaman yang diajukan
  cosmos.base.v1beta1.Coin principal = 3;

  // Durasi pinjaman dalam satuan bulan
  uint64 tenor_months = 4;

  // Hash dokumen pendukung (misalnya IPFS CID atau SHA256 kontrak)
  string metadata_hash = 5;
}

// MsgCreateLoanResponse mengembalikan ID pinjaman yang baru dibuat
message MsgCreateLoanResponse {
  // ID unik pinjaman yang tersimpan di state
  uint64 loan_id = 1;
}

// MsgApproveLoan digunakan oleh laz yang berwenang untuk menyetujui pinjaman
message MsgApproveLoan {
  option (cosmos.msg.v1.signer) = "laz";

  // Alamat (laz) sebagai otoritas persetujuan
  string laz = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // ID pinjaman yang akan disetujui
  uint64 loan_id = 2;
}

// MsgApproveLoanResponse tidak mengembalikan data tambahan
message MsgApproveLoanResponse {}

// MsgRejectLoan digunakan oleh laz yang berwenang untuk menolak pinjaman
message MsgRejectLoan {
  option (cosmos.msg.v1.signer) = "laz";

  // Alamat  sebagai otoritas penolakan
  string laz = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // ID pinjaman yang akan ditolak
  uint64 loan_id = 2;
}

// MsgRejectLoanResponse tidak mengembalikan data tambahan
message MsgRejectLoanResponse {}

// MsgRepayLoan digunakan untuk mencatat pembayaran pinjaman yang dihasilkan oleh omnibus
message MsgRepayLoan {
  option (cosmos.msg.v1.signer) = "omnibus";

  // Alamat omnibus sebagai otoritas pembayaran
  string omnibus = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // ID pinjaman yang dibayar
  uint64 loan_id = 2;

  // Jumlah yang dibayarkan
  cosmos.base.v1beta1.Coin amount = 3;
}

// MsgRepayLoanResponse tidak mengembalikan data tambahan
message MsgRepayLoanResponse {}

// MsgConfirmDisbursement digunakan untuk mengonfirmasi bahwa dana telah dicairkan
message MsgConfirmDisbursement {
  option (cosmos.msg.v1.signer) = "omnibus";

  // Alamat omnibus sebagai otoritas pencairan dana
  string omnibus = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // ID pinjaman yang dicairkan
  uint64 loan_id = 2;
}

// MsgConfirmDisbursementResponse tidak mengembalikan data tambahan
message MsgConfirmDisbursementResponse {}

// MsgRejectDisbursement, Omnibus dalam kasus tertentu, menolak pencairan dana pinjaman yang sudah disetujui
// cth: layanan error, bank transfer gagal, rekening borrower invalid, etc
message MsgRejectDisbursement {
  option (cosmos.msg.v1.signer) = "omnibus";

  // alamat omnibus yang berwenang menolak pencairan
  string omnibus = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // ID pinjaman yang pencairannya ditolak
  uint64 loan_id = 2;

  // alasan penolakan pencairan
  string reason = 3;
}

// MsgRejectDisbursementResponse tidak mengembalikan data tambahan
message MsgRejectDisbursementResponse {}