<!DOCTYPE html>
<html>
<head>
<title>Loan Queries</title>
</head>

<body>

<h1>Queries</h1>

<h2>Query Params</h2>

<pre>
GET /cosmos/loan/v1/params
</pre>

<h2>Query Loan</h2>

<pre>
GET /cosmos/loan/v1/loan/{loan_id}
</pre>

<h2>Query Loans</h2>

<pre>
GET /cosmos/loan/v1/loans
</pre>

<h2>Query Loans By Borrower</h2>

<pre>
GET /cosmos/loan/v1/borrowers/{borrower}/loans
</pre>

</body>
</html>
